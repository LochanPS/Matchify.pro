<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ─────────────────────────────────────────────────────────── -->
    <!-- viewport-fit=cover: fills iPhone X+ notch area                         -->
    <!-- user-scalable=yes + maximum-scale=5: allows accessibility zoom          -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <!-- ── PWA / Add to Home Screen ──────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- valid values: default | black | black-translucent -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Matchify" />

    <!-- ── Icons ─────────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <!-- Apple touch icon — used when user adds to iPhone home screen            -->
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/app-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon.png" />

    <!-- ── iOS PWA Splash Screens ────────────────────────────────────────────── -->
    <!-- Shown while PWA is launching (before JS loads) — prevents white flash.  -->
    <!-- black-translucent status bar + viewport-fit=cover = full-bleed splash.  -->
    <!-- Each image is sized to its device's EXACT pixel resolution (CSS px x DPR) -->
    <!-- — iOS does not scale this tag, so a mismatched size causes letterboxing. -->
    <!-- Default fallback for unmatched devices -->
    <link rel="apple-touch-startup-image" href="/splash-1170x2532.png" />
    <!-- iPhone 16 Pro Max  -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1320x2868.png" />
    <!-- iPhone 15 Pro / 14 Pro -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1179x2556.png" />
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1170x2532.png" />
    <!-- iPhone SE (3rd gen) / 8 -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/splash-750x1334.png" />
    <!-- iPhone 11 / XR -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/splash-828x1792.png" />

    <!-- ── Theme colours ─────────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#07071a" />
    <meta name="msapplication-navbutton-color" content="#07071a" />

    <!-- ── Misc ──────────────────────────────────────────────────────────────── -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── SEO ───────────────────────────────────────────────────────────────── -->
    <title>🎾 Matchify.pro - India's Premier Badminton Tournament Platform</title>
    <meta name="description" content="Join India's largest badminton tournament platform. Register for tournaments, track your progress, and compete with players across the country." />
    <meta name="keywords" content="badminton, tournament, India, sports, competition, matches" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://matchify.pro/" />
    <meta property="og:title" content="🎾 Matchify.pro - India's Premier Badminton Tournament Platform" />
    <meta property="og:description" content="Join India's largest badminton tournament platform. Register for tournaments, track your progress, and compete with players across the country." />
    <meta property="og:image" content="/matchify-og.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://matchify.pro/" />
    <meta property="twitter:title" content="🎾 Matchify.pro - India's Premier Badminton Tournament Platform" />
    <meta property="twitter:description" content="Join India's largest badminton tournament platform." />
    <meta property="twitter:image" content="/matchify-og.png" />

    <!-- ── Fonts ──────────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- ── Razorpay ───────────────────────────────────────────────────────────── -->
    <!-- async: does NOT block page render. If Razorpay CDN is slow (common on   -->
    <!-- Indian mobile networks), app loads normally and Razorpay is ready when   -->
    <!-- the user actually taps Pay — no blank white screen on iPhone.            -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
